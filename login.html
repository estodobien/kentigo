<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Kentigo</title>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="auth-container">

    <h1>Kentigo</h1>

    <p>Найди компанию уже сегодня</p>

    <button id="googleLogin">
        Продолжить с Google
    </button>

    <hr>

    <h2>Вход</h2>

    <input
        id="loginEmail"
        type="email"
        placeholder="Email"
    >

    <input
        id="loginPassword"
        type="password"
        placeholder="Пароль"
    >

    <button id="loginBtn">
        Войти
    </button>

    <hr>

    <h2>Регистрация</h2>

    <input
        id="registerName"
        type="text"
        placeholder="Имя"
    >

    <input
        id="registerEmail"
        type="email"
        placeholder="Email"
    >

    <input
        id="registerPassword"
        type="password"
        placeholder="Пароль"
    >

    <button id="registerBtn">
        Зарегистрироваться
    </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
