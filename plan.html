<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Встреча | Kentigo</title>

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

    <div class="container header-content">

        <a href="index.html" class="logo">
            Kentigo
        </a>

        <nav class="header-actions">

            <a
                href="index.html"
                class="btn btn-light">

                ← Назад

            </a>

            <button
                id="userButton"
                class="btn btn-primary"
                data-login>

                Войти

            </button>

        </nav>

    </div>

</header>

<!-- ================= PLAN ================= -->

<main class="plan-page">

    <div class="container">

        <div
            id="planCover"
            class="plan-cover">

            📍

        </div>

        <div class="plan-card">

            <div
                id="categoryBadge"
                class="plan-category">

                ...

            </div>

            <h1 id="planTitle">

                Загрузка...

            </h1>

            <div class="plan-meta">

                <div id="planDate"></div>

                <div id="planTime"></div>

                <div id="planCity"></div>

                <div id="planPlace"></div>

            </div>

            <section class="plan-section">

                <h2>Описание</h2>

                <p id="planDescription"></p>

            </section>

            <section class="plan-section">

                <h2>Организатор</h2>

                <div id="planCreator">

                    Скоро появится

                </div>

            </section>

            <section class="plan-section">

    <h2>Участники</h2>

    <div id="participantsCount">
        0 / 0 участников
    </div>

    <div id="participantsList"></div>

    <button
        id="joinPlanBtn"
        class="btn btn-primary">

        Присоединиться

    </button>

    <div id="ownerActions" style="display:none; margin-top:16px;">

    <button
        id="editPlanBtn"
        class="btn">

        ✏️ Редактировать

    </button>

    <button
        id="deletePlanBtn"
        class="btn btn-danger">

        🗑️ Удалить встречу

    </button>

</div>

</section>

        </div>

    </div>

</main>

<!-- ================= FOOTER ================= -->

<footer class="footer">

    <div class="container">

        <p>

            © 2026 Kentigo

        </p>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/plan.js"></script>

</body>

</html>
