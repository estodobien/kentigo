<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Встреча | Kentigo</title>

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

    <div class="container header-content">

        <a
            href="index.html"
            class="logo">

            Kentigo

        </a>

        <nav class="header-actions">

            <a
                href="index.html"
                class="btn btn-light">

                ← Назад

            </a>

            <button
                class="btn btn-primary"
                data-login>

                Войти

            </button>

        </nav>

    </div>

</header>





<!-- ================= PLAN ================= -->

<main class="container">

    <section class="plan-page">

        <div
            id="planImage"
            class="plan-page-image">

            📍

        </div>

        <div class="plan-page-content">

            <div
                id="planCategory"
                class="plan-category">

                ...

            </div>

            <h1 id="planTitle">

                Загрузка...

            </h1>

            <div class="plan-details">

                <div id="planDate">📅</div>

                <div id="planTime">🕒</div>

                <div id="planCity">📍</div>

                <div id="planPlace">📌</div>

            </div>

            <div class="plan-description-box">

                <h3>

                    Описание

                </h3>

                <p id="planDescription">

                    ...

                </p>

            </div>

            <div class="plan-members-box">

                <h3>

                    Участники

                </h3>

                <p id="planMembers">

                    0 / 0 участников

                </p>

            </div>

            <button
                id="joinPlanBtn"
                class="btn btn-primary">

                Присоединиться

            </button>

        </div>

    </section>

</main>





<!-- ================= FOOTER ================= -->

<footer class="footer">

    <div class="container">

        <p>

            © 2026 Kentigo

        </p>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/auth.js"></script>

<script src="js/plan.js"></script>

</body>

</html>
